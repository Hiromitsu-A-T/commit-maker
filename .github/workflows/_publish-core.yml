name: Publish Extension Core

on:
  workflow_call:
    inputs:
      channel:
        description: "Release channel: stable or preview"
        required: true
        type: string
      pre_release:
        description: "Whether to pass --pre-release to package and publish"
        required: true
        type: boolean
    secrets:
      VSCE_PAT:
        required: false
      OVSX_PAT:
        required: false

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate channel, version, and tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CHANNEL="${{ inputs.channel }}"
          PRE_RELEASE="${{ inputs.pre_release }}"

          if [ "$CHANNEL" != "stable" ] && [ "$CHANNEL" != "preview" ]; then
            echo "::error::channel must be stable or preview, got '$CHANNEL'."
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json version must be major.minor.patch, got '$VERSION'."
            exit 1
          fi

          MINOR=$(node -p "require('./package.json').version.split('.')[1]")

          if [ "$CHANNEL" = "stable" ]; then
            if [ "$PRE_RELEASE" != "false" ]; then
              echo "::error::stable releases must not use --pre-release."
              exit 1
            fi
            if (( MINOR % 2 != 0 )); then
              echo "::error::stable releases must use an even MINOR version, got '$VERSION'."
              exit 1
            fi
            if [ "${{ github.ref_type }}" != "tag" ]; then
              echo "::error::stable publishing must be started by pushing v<version> tag."
              exit 1
            fi
          fi

          if [ "$CHANNEL" = "preview" ]; then
            if [ "$PRE_RELEASE" != "true" ]; then
              echo "::error::preview releases must use --pre-release."
              exit 1
            fi
            if (( MINOR % 2 == 0 )); then
              echo "::error::preview releases must use an odd MINOR version, got '$VERSION'."
              exit 1
            fi
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "::error::preview publishing must be started manually, not by tag push."
              exit 1
            fi
          fi

          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "::error::tag version '$TAG_VERSION' does not match package.json version '$VERSION'."
              exit 1
            fi
          fi

          echo "Validated $CHANNEL release $VERSION."

  local-runtime-smoke:
    name: Local runtime smoke (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run compile

      - name: Smoke local runtime auto install
        run: npm run smoke:local:runtime

  publish:
    name: Publish ${{ inputs.channel }}
    needs: local-runtime-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show release channel
        shell: bash
        run: |
          echo "Release channel: ${{ inputs.channel }}"

      - name: Build webview helpers
        run: npm run build:media

      - name: Build
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package VSIX
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm run build:nls
          trap 'npm run clean:nls' EXIT
          ARGS=(--no-dependencies --no-rewrite-relative-links)
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            ARGS+=(--pre-release)
          fi
          npx vsce package "${ARGS[@]}"
          mkdir -p vsix
          mv "commit-maker-${VERSION}.vsix" vsix/

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: commit-maker-${{ inputs.channel }}-vsix
          path: vsix/*.vsix

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ARGS=(--packagePath "vsix/commit-maker-${VERSION}.vsix" --skip-duplicate)
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            ARGS+=(--pre-release)
          fi
          npx vsce publish "${ARGS[@]}"

      - name: Ensure Open VSX namespace
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npx ovsx create-namespace Hiromitsu || true

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ARGS=("vsix/commit-maker-${VERSION}.vsix" --skip-duplicate)
          if [ "${{ inputs.pre_release }}" = "true" ]; then
            ARGS+=(--pre-release)
          fi
          npx ovsx publish "${ARGS[@]}"

      - name: Clean stray VSIX and enforce limit (keep latest 5)
        if: always()
        run: npm run clean:vsix
