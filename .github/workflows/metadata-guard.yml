name: Metadata Guard

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  commit-email-guard:
    name: Commit email guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check commit email metadata
        run: node scripts/check-commit-emails.js --all
