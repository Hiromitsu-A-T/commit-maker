name: Publish Extension (Preview)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-preview:
    uses: ./.github/workflows/_publish-core.yml
    with:
      channel: preview
      pre_release: true
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
