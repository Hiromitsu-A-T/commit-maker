name: Update README Badges

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  workflow_run:
    workflows:
      - "Publish Extension (Stable)"
      - "Publish Extension (Preview)"
      - "Weekly Patch Publish"
    types:
      - completed

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-badges:
    name: Refresh cached badge data
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update badge JSON
        run: npm run update:badges

      - name: Commit badge updates
        shell: bash
        run: |
          if git diff --quiet -- media/badges; then
            echo "Badge JSON is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media/badges
          git commit -m "chore: バッジ統計を更新 [skip ci]"
          git push
